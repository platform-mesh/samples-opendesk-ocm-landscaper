      port: 7357
  # https://gitlab.opencode.de/bmi/opendesk/deployment/opendesk/-/blob/develop/helmfile/environments/default/cache.yaml.gotmpl?ref_type=heads
  cache:
    intercomService:
      host: "redis-headless"
      port: 6379
      username: "default"
      password: ""
    nextcloud:
      host: "redis-headless"
      port: 6379
      username: "default"
      password: ""
      tls: false
    notes:
      host: "redis-headless"
      port: 6379
      password: ""
    openproject:
      host: "memcached"
      port: 11211
    oxAppSuite:
      host: "redis-headless"
      port: 6379
      username: "default"
      password: ""
    umsSelfservice:
      host: "memcached"
      port: 11211
  # https://gitlab.opencode.de/bmi/opendesk/deployment/opendesk/-/blob/develop/helmfile/environments/default/certificate.yaml.gotmpl?ref_type=heads
  certificate:
    issuerRef:
      name: "letsencrypt-prod"
      kind: "ClusterIssuer"
    # When using `wildcard: true` please ensure you configure the cert-manager accordingly, e.g. using DNS
    # validation (`DNS-01`) in case of letsencrypt.
    wildcard: false
    selfSigned: false
  # https://gitlab.opencode.de/bmi/opendesk/deployment/opendesk/-/blob/develop/helmfile/environments/default/cluster.yaml.gotmpl?ref_type=heads
  cluster:
    service:
      # Based on the available Implementations of your cluster, choose the type of Service.
      # Choose out of "ClusterIP", "NodePort" or "LoadBalancer.
      type: "LoadBalancer"

    persistence:
      # Enable if ReadWriteMany (RWX) storage is available (f.e. CephFS, NFS, ...).
      readWriteMany:
        enabled: false

    networking:
      # Kubernetes internal cluster domain.
      domain: "cluster.local"
      # Kubernetes cluster network CIDRs.
      cidr:
        - "10.0.0.0/8"
      # IP addresses or IP ranges of the reverse proxy / load balancer to restrict the requesting source
      # for defined services.
      incomingCIDR: []
      # Ingress-gateway IP - only relevant for "NodePort" cluster services.
      # When ingress and egress gateway use different ips, which results that pods can't self-discover their incoming ip,
      # you need to provide the public (load-balanced) ingress gateways ip address.
      ingressGatewayIP: ""
      # LoadBalancer status field - only relevant for "LoadBalancer" cluster services.
      # The IP/DNS of your load-balancer will be fetched for some components from 'status' map of services.
      # Most providers use '.status.loadBalancer.ingress[0].ip' to store public ip. You can modify the chosen field here.
      loadBalancerStatusField: "ip"
      # Network protocol options: "IPv4", "IPv6", "DualStack"
      ipFamilies: "DualStack"

    container:
      # Used container engine in kubernetes cluster.
      engine: "cri-o"
  # https://gitlab.opencode.de/bmi/opendesk/deployment/opendesk/-/blob/develop/helmfile/environments/default/database.yaml.gotmpl?ref_type=heads
  databases:
    defaults:
      userConnectionLimit: 100
    dovecotDictmap:
      type: "cassandra"
      name: "dovecot_dictmap"
      host: "cassandra"
      port: 9042
      username: "dovecot_dictmap_user"
      password: ""
      connectionLimit: ~
