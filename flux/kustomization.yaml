---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: poc-bmi-opendeskocm
  namespace: default
spec:
  interval: 10s
  targetNamespace: default
  sourceRef:
    kind: GitRepository
    name: poc-bmi-opendesk
  path: "./landscaper/cc-cluster-opendeskocm"
  prune: true
  timeout: 1m