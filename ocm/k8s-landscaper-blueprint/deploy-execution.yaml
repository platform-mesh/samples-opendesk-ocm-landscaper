deployItems:
  - name: deploy-item-ingress-nginx
    type: landscaper.gardener.cloud/helm
    target:
      import: cluster # "cluster" is the name of an import parameter
    config:
      apiVersion: helm.deployer.landscaper.gardener.cloud/v1alpha1
      kind: ProviderConfiguration
      name: ingress-nginx
      namespace: default
      createNamespace: false
      chart:
        resourceRef: {{ getResourceKey `cd://resources/helm-chart-ingress-nginx` }}
      values:
        controller:
          allowSnippetAnnotations: true
          config:
            # https://gitlab.opencode.de/bmi/opendesk/deployment/opendesk/-/blob/develop/docs/requirements.md#supported-controllers
            controller.config.annotations-risk-level: "Critical"
            controller.config.strict-validate-path-type: false
            annotations-risk-level: "Critical"
            strict-validate-path-type: false
            allow-snippet-annotations: true
          service:
            annotations:
              ingressclass.kubernetes.io/is-default-class: "true"
              loadbalancer.openstack.org/class: internet
              # Let Gardener manage external DNS records for this Service.
              dns.gardener.cloud/dnsnames: "*.{{ .imports.environmentsDefaults.global.domain | toYaml }}"
              dns.gardener.cloud/ttl: "600"
              dns.gardener.cloud/class: garden

  - name: deploy-item-cert-manager
    type: landscaper.gardener.cloud/helm
    dependsOn:
      - deploy-item-ingress-nginx
    target:
      import: cluster # "cluster" is the name of an import parameter
    config:
      apiVersion: helm.deployer.landscaper.gardener.cloud/v1alpha1
      kind: ProviderConfiguration
      name: cert-manager
      namespace: default
      createNamespace: false
      chart:
        resourceRef: {{ getResourceKey `cd://resources/helm-chart-cert-manager` }}
      values:
        webhook:
          timeoutSeconds: 14
        crds:
          enabled: true

